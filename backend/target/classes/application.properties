# ============================================
# Insurance Buffer - Application Configuration
# CIS200 Honors - Java Backend
# ============================================

# Server
server.port=${PORT:8080}
spring.application.name=insurance-buffer

# Retell AI (loaded from environment variables - NEVER hardcode keys here)
retell.api.key=${RETELL_API_KEY}
retell.agent.id=${RETELL_AGENT_ID}

# Email configuration (Gmail SMTP)
email.to=brettkendig8@gmail.com
email.from=${EMAIL_FROM:noreply@insuranceleads.app}
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.username=${SMTP_USERNAME:}
email.smtp.password=${SMTP_PASSWORD:}

# Logging
logging.level.com.insurancebuffer=INFO
logging.level.root=WARN

# CORS (restrict to your frontend domain in production)
# spring.web.cors.allowed-origins=https://yourdomain.com
